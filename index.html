<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Meeting Assistant - Transcriber & Summarizer</title>
    <link rel="stylesheet" href="style.css">
    <!-- Menggunakan font Poppins untuk kesan profesional -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="light-mode"> <!-- Default: Mode Terang -->
    
    <nav class="navbar">
        <div class="nav-container">
            <span class="brand-name">Corporate Voice Intelligence</span>
            <button id="themeToggle" class="btn-theme">Ubah Mode</button>
        </div>
    </nav>

    <div class="main-container">
        <header class="header-section">
            <h1>Asisten Pertemuan AI</h1>
            <p class="subtitle">Platform profesional untuk transkripsi dan ringkasan rapat otomatis.</p>
        </header>

        <!-- Kontrol Perekaman -->
        <div class="controls-panel">
            <div class="status-group">
                <span class="status-label">Status Sistem:</span>
                <span id="status" class="status-value status-ready">Siap</span>
            </div>
            <div class="action-group">
                <button id="startBtn" class="btn-primary btn-start">Mulai Merekam</button>
                <button id="stopBtn" class="btn-secondary btn-stop" disabled>Berhenti</button>
            </div>
        </div>

        <div class="content-grid">
            <!-- Kolom Hasil Transkrip -->
            <section class="result-section">
                <div class="section-header">
                    <h3>Transkrip Suara (Speech-to-Text)</h3>
                    <span class="language-tag">Bahasa Indonesia</span>
                </div>
                <textarea id="transcriptionResult" placeholder="Teks hasil rekaman suara akan muncul di sini..." readonly></textarea>
            </section>

            <!-- Kolom Hasil Kesimpulan AI -->
            <section class="result-section">
                <div class="section-header">
                    <h3>Ringkasan Eksekutif (AI Summary)</h3>
                    <span class="ai-tag">Powered by AI</span>
                </div>
                <textarea id="summaryResult" placeholder="Ringkasan poin-poin penting rapat akan muncul di sini..." readonly></textarea>
            </section>
        </div>

        <!-- Tombol Ekspor -->
        <footer class="action-footer">
            <button id="saveBtn" class="btn-save" disabled>Ekspor Hasil Rapat (TXT)</button>
        </footer>
    </div>

    <!-- Menghubungkan ke file JavaScript -->
    <script src="app.js"></script>
</body>
</html>
