<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Meeting Assistant - Transcriber & Summarizer</title>
    <!-- Menggunakan font Poppins untuk kesan profesional -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- VARIABEL WARNA (CSS VARIABLES) --- */
        :root {
            /* Mode Terang (Default) */
            --bg-color: #f8f9fa;
            --container-bg: #ffffff;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --border-color: #dee2e6;
            
            --primary-color: #0056b3; /* Biru Profesional */
            --primary-hover: #004494;
            --secondary-color: #6c757d;
            --secondary-hover: #5a6268;
            --danger-color: #dc3545; /* Merah Berhenti */
            --danger-hover: #a71d2a;
            --success-color: #198754; /* Hijau Ekspor */
            
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.12);
        }

        /* Mode Gelap (Dark Mode) */
        body.dark-mode {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --border-color: #333333;
            
            --primary-color: #3792ff;
            --primary-hover: #1c75e1;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.5);
        }

        /* --- STYLING DASAR --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
            line-height: 1.6;
        }

        /* --- NAVBAR --- */
        .navbar {
            background-color: var(--container-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
            box-shadow: var(--shadow-sm);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-name {
            font-weight: 600;
            font-size: 1.25rem;
            color: var(--primary-color);
        }

        /* --- MAIN LAYOUT --- */
        .main-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 20px;
            padding-bottom: 4rem;
        }

        .header-section {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-weight: 600;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* --- PANEL KONTROL --- */
        .controls-panel {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-sm);
        }

        .status-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-label {
            font-weight: 500;
            color: var(--text-secondary);
        }

        .status-value {
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .status-ready { background-color: #e2e6ea; color: #495057; }
        body.dark-mode .status-ready { background-color: #333; color: #ccc; }

        .status-recording { background-color: #f8d7da; color: #842029; animation: pulse 1.5s infinite; }
        body.dark-mode .status-recording { background-color: #561c20; color: #ea868f; }

        .action-group {
            display: flex;
            gap: 10px;
        }

        /* --- KOTAK HASIL (GRID) --- */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 2rem;
        }

        @media (max-width: 768px) {
            .content-grid { grid-template-columns: 1fr; }
        }

        .result-section {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        h3 {
            font-weight: 500;
            font-size: 1.1rem;
        }

        .language-tag, .ai-tag {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        textarea {
            flex-grow: 1;
            width: 100%;
            height: 350px;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            line-height: 1.7;
            transition: background-color 0.3s, color 0.3s;
        }

        body.dark-mode textarea {
            background-color: #2a2a2a;
            color: #e0e0e0;
            border-color: #444444;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        /* --- TOMBOL TOMBOL --- */
        button {
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-theme {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 0.85rem;
            padding: 6px 14px;
        }
        .btn-theme:hover { background-color: var(--border-color); }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }
        .btn-primary:hover { background-color: var(--primary-hover); }

        .btn-secondary {
            background-color: var(--secondary-color);
            color: white;
        }
        .btn-secondary:hover { background-color: var(--secondary-hover); }

        .btn-stop:not(:disabled) {
            background-color: var(--danger-color);
        }
        .btn-stop:not(:disabled):hover {
            background-color: var(--danger-hover);
        }

        .action-footer {
            text-align: center;
        }

        .btn-save {
            background-color: var(--success-color);
            color: white;
            padding: 12px 30px;
            font-size: 1rem;
        }

        /* --- ANIMASI REKAMAN --- */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body class="light-mode">
    
    <nav class="navbar">
        <div class="nav-container">
            <span class="brand-name">Corporate Voice Intelligence</span>
            <button id="themeToggle" class="btn-theme">Ubah Mode</button>
        </div>
    </nav>

    <div class="main-container">
        <header class="header-section">
            <h1>Asisten Pertemuan AI</h1>
            <p class="subtitle">Platform profesional untuk transkripsi dan ringkasan rapat otomatis.</p>
        </header>

        <!-- Kontrol Perekaman -->
        <div class="controls-panel">
            <div class="status-group">
                <span class="status-label">Status Sistem:</span>
                <span id="status" class="status-value status-ready">Siap</span>
            </div>
            <div class="action-group">
                <button id="startBtn" class="btn-primary btn-start">Mulai Merekam</button>
                <button id="stopBtn" class="btn-secondary btn-stop" disabled>Berhenti</button>
            </div>
        </div>

        <div class="content-grid">
            <!-- Kolom Hasil Transkrip -->
            <section class="result-section">
                <div class="section-header">
                    <h3>Transkrip Suara (Speech-to-Text)</h3>
                    <span class="language-tag">Bahasa Indonesia</span>
                </div>
                <textarea id="transcriptionResult" placeholder="Teks hasil rekaman suara akan muncul di sini..." readonly></textarea>
            </section>

            <!-- Kolom Hasil Kesimpulan AI -->
            <section class="result-section">
                <div class="section-header">
                    <h3>Ringkasan Eksekutif (AI Summary)</h3>
                    <span class="ai-tag">Powered by AI</span>
                </div>
                <textarea id="summaryResult" placeholder="Ringkasan poin-poin penting rapat akan muncul di sini..." readonly></textarea>
            </section>
        </div>

        <!-- Tombol Ekspor -->
        <footer class="action-footer">
            <button id="saveBtn" class="btn-save" disabled>Ekspor Hasil Rapat (TXT)</button>
        </footer>
    </div>

    <!-- LOGIKA UTAMA JAVASCRIPT -->
    <script>
        // --- LOGIKA TEMA (DARK/LIGHT MODE) ---
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;

        // Cek preferensi tema sebelumnya di penyimpanan browser
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            body.className = savedTheme;
        }

        themeToggle.addEventListener('click', () => {
            if (body.classList.contains('light-mode')) {
                body.classList.replace('light-mode', 'dark-mode');
                localStorage.setItem('theme', 'dark-mode');
            } else {
                body.classList.replace('dark-mode', 'light-mode');
                localStorage.setItem('theme', 'light-mode');
            }
        });

        // --- LOGIKA PEREKAMAN SUARA ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isRecording = false;

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusText = document.getElementById('status');
        const transcriptionResult = document.getElementById('transcriptionResult');
        const summaryResult = document.getElementById('summaryResult');
        const saveBtn = document.getElementById('saveBtn');

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'id-ID';

            recognition.onresult = (event) => {
                let currentText = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    currentText += event.results[i][0].transcript + ' ';
                }
                transcriptionResult.value += currentText;
            };

            recognition.onerror = (event) => {
                console.error("Error perekaman: ", event.error);
                statusText.innerText = "Terjadi Kesalahan";
                statusText.className = "status-value status-ready";
            };

            recognition.onend = () => {
                if (isRecording) {
                    recognition.start(); // Jaga agar tetap merekam jika terputus jeda kalimat
                } else {
                    statusText.innerText = "Siap";
                    statusText.className = "status-value status-ready";
                }
            };

        } else {
            alert("Browser tidak mendukung perekaman suara langsung. Disarankan memakai Google Chrome.");
        }

        startBtn.addEventListener('click', () => {
            if (recognition && !isRecording) {
                recognition.start();
                isRecording = true;
                
                startBtn.disabled = true;
                stopBtn.disabled = false;
                saveBtn.disabled = true;
                
                statusText.innerText = "Sedang Merekam...";
                statusText.className = "status-value status-recording";
            }
        });

        stopBtn.addEventListener('click', () => {
            if (recognition && isRecording) {
                isRecording = false; 
                recognition.stop();
                
                startBtn.disabled = false;
                stopBtn.disabled = true;
                saveBtn.disabled = false;
                
                statusText.innerText = "Memproses Ringkasan AI...";
                statusText.className = "status-value status-ready";
                
                panggilAIKesimpulan();
            }
        });

        function panggilAIKesimpulan() {
            summaryResult.value = "Menghubungkan ke layanan AI untuk analisis...\n\n[Placeholder]: Di sini teks transkrip akan dikirim ke API AI, lalu AI akan mengembalikan poin-poin penting, keputusan rapat, dan daftar tindakan (action items) secara otomatis.";
        }

        saveBtn.addEventListener('click', () => {
            const tanggal = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
            const teksYangDisimpan = `--- DOKUMEN HASIL RAPAT ---\nTanggal: ${tanggal}\n\n[1. TRANSKRIP MENTAH]\n${transcriptionResult.value}\n\n[2. RINGKASAN EKSEKUTIF AI]\n${summaryResult.value}`;
            const blob = new Blob([teksYangDisimpan], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Notulensi_Rapat_${tanggal}.txt`;
            link.click();
        });
    </script>
</body>
</html>
